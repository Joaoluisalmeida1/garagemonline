<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem Online</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- noUiSlider CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.4.0/nouislider.min.css">
    <!-- noUiSlider JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/noUiSlider/15.4.0/nouislider.min.js"></script>

    <!-- Header Section -->
     <header>
        <div class="container">
            <div class="logo">
                <h1>Garagem Online<span class="dot">.</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Fórum</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Carros Vendidos</a></li>
                    <li><a href="#" class="login-button">Login</a></li>
                </ul>
            </nav>
        </div>
     </header>
     <main>
        <div class="container">
            <!-- Search Box -->
            <section class="search-section">
                <!-- Search Bar -->
                <div class="form-group">
                    <label for="car-search">Procurar carro</label>
                    <input type="text" id="car-search" name="car-search" placeholder="Procurar">
                </div>
            
                <!-- Second row for make, model, submodel, and color -->
                <div class="form-grid">
                    <div class="form-group">
                        <label for="make">Marca</label>
                        <input type="text" id="make" name="make" placeholder="Marca">
                        <ul id="make-suggestions" class="suggestions-list"></ul> <!-- Unique ID for Marca suggestions -->
                    </div>
                    
                    <div class="form-group">
                        <label for="model">Modelo</label>
                        <input type="text" id="model" name="model" placeholder="Modelo">
                        <ul id="model-suggestions" class="suggestions-list"></ul> <!-- Unique ID for Modelo suggestions -->
                    </div>
                    
                    <div class="form-group">
                        <label for="submodel">Submodelo</label>
                        <input type="text" id="submodel" name="submodel" placeholder="Submodelo">
                        <ul id="submodel-suggestions" class="suggestions-list"></ul> <!-- Unique ID for Submodelo suggestions -->
                    </div>
            
                    <div class="form-group">
                        <label for="color">Cor</label>
                        <select id="color" name="color">
                            <option value="branco">Branco</option>
                            <option value="preto">Preto</option>
                            <option value="vermelho">Vermelho</option>
                            <option value="azul">Azul</option>
                        </select>
                    </div>
                </div>
            
                <!-- Sliders for Kilómetros, Ano, Preço -->
                <div class="form-grid range-container">
                    <!-- Kilómetros Range Sliders -->
                    <div class="form-group">
                        <label for="kms-range">Kilómetros</label>
                        <div id="kms-range"></div>
                        <output id="kms-output">10000 - 100000</output>
                    </div>
                
                    <!-- Year Range Sliders -->
                    <div class="form-group">
                        <label for="year-range">Ano</label>
                        <div id="year-range"></div>
                        <output id="year-output">2010 - 2015</output>
                    </div>
                
                    <!-- Preço Range Sliders -->
                    <div class="form-group">
                        <label for="price-range">Preço</label>
                        <div id="price-range"></div>
                        <output id="price-output">10000 - 50000</output>
                    </div>
                </div>
                
                
            
                <!-- Search Button -->
                <button type="submit" class="search-button"><strong>Pesquisar</strong></button>
            </section>
            
            
            
             <section class="category-section">
                <div class="category-box">Clássicos</div>
                <div class="category-box">SUVs</div>
                <div class="category-box">Económicos</div>
                <div class="category-box">Elétricos</div>
             </section>
        </div>
     </main>

     <!-- Footer Section -->
      <footer>
        <div class="container">
            <p>&copy; 2024 Garagem Virtual. Todos os direitos reservados.</p>
        </div>
      </footer>

      <script src="script.js"></script>
</body>
</html>
