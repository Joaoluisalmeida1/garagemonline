<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem Online</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- Header Section -->
     <header>
        <div class="container">
            <div class="logo">
                <h1>Garagem Online<span class="dot">.</span></h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Fórum</a></li>
                    <li><a href="#">Sobre</a></li>
                    <li><a href="#">Carros Vendidos</a></li>
                    <li><a href="#" class="login-button">Login</a></li>
                </ul>
            </nav>
        </div>
     </header>
     <main>
        <div class="container">
            <!-- Search Box -->
            <section class="search-section">
                <h2>Encontre o seu próximo carro</h2>
                <form class="search-form">
                    <div class="form-grid">
                        <!-- Kms Range Slider -->
                        <div class="form-group">
                            <label for="mileage">Kms</label>
                            <input type="range" id="mileage" name="mileage" min="0" max="500000" value="100000" step="5000" oninput="document.getElementById('mileage-output').value = this.value">
                            <output id="mileage-output">100000</output>
                        </div>
            
                        <!-- Year Range -->
                        <div class="form-group">
                            <label for="year">Ano</label>
                            <input type="range" id="year" name="year" min="1980" max="2024" value="2010" step="1" oninput="document.getElementById('year-output').value = this.value">
                            <output id="year-output">2010</output>
                        </div>
            
                        <!-- Price Range Slider -->
                        <div class="form-group">
                            <label for="price">Preço (De)</label>
                            <input type="range" id="price" name="price" min="0" max="100000" value="30000" step="1000" oninput="document.getElementById('price-output').value = this.value">
                            <output id="price-output">30000</output>
                        </div>
            
                        <!-- Color -->
                        <div class="form-group">
                            <label for="color">Cor</label>
                            <select id="color" name="color">
                                <option value="">Escolha uma cor</option>
                                <option value="branco">Branco</option>
                                <option value="preto">Preto</option>
                                <option value="vermelho">Vermelho</option>
                                <option value="azul">Azul</option>
                            </select>
                        </div>
            
                        <!-- Make and Model -->
                        <div class="form-group">
                            <label for="make">Marca</label>
                            <input type="text" id="make" name="make" placeholder="Marca">
                        </div>
                        <div class="form-group">
                            <label for="model">Modelo</label>
                            <input type="text" id="model" name="model" placeholder="Modelo">
                            <ul id="suggestions-list"></ul>
                        </div>
                    </div>
            
                    <button type="submit" class="search-button">Pesquisar</button>
                </form>
            </section>
            
            
             <section class="category-section">
                <div class="category-box">Clássicos</div>
                <div class="category-box">SUVs</div>
                <div class="category-box">Económicos</div>
                <div class="category-box">Elétricos</div>
             </section>
        </div>
     </main>

     <!-- Footer Section -->
      <footer>
        <div class="container">
            <p>&copy; 2024 Garagem Virtual. Todos os direitos reservados.</p>
        </div>
      </footer>

      <script src="script.js"></script>
</body>
</html>
