<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garagem Online</title>
    <link rel="stylesheet" href="styles.css">

</head>
<body>
    <!-- Header Section -->
     <header>
        <div class="container">
            <div class="logo">
                <h1>Garagem Online</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="#">Vender Carro</a></li>
                    <li><a href="#">Login</a></li>
                </ul>
            </nav>
        </div>
     </header>
     <main>
        <div class="container">
            <!-- Search Box -->
             <section class="search-section">
                <h2>Encontre o seu próximo carro</h2>
                <form class="search-form">
                    <input type="text" placeholder="Procurar por marca, modelo ou caraterística">
                    <button type="submit">Procurar</button>
                </form>
             </section>
             <section class="category-section">
                <div class="category-box">Clássicos</div>
                <div class="category-box">SUVs</div>
                <div class="category-box">Económicos</div>
                <div class="category-box">Elétricos</div>
             </section>
        </div>
     </main>

     <!-- Footer Section -->
      <footer>
        <div class="container">
            <p>&copy; 2024 Garagem Virtual. Todos os direitos reservados.</p>
        </div>
      </footer>

      <script src="script.js"></script>
</body>
</html>
