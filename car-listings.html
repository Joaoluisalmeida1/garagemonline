<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Listings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="container">
        <div class="logo">
            <h1>Garagem Online<span class="dot">.</span></h1>
        </div>
        <nav>
            <ul>
                <li><a href="#">Fórum</a></li>
                <li><a href="#">Sobre</a></li>
                <li><a href="#">Carros Vendidos</a></li>
                <li><a href="#" class="login-button">Login</a></li>
            </ul>
        </nav>
    </div>
    </header>

<main>
    <div class="container">
        <h2>Car Listings</h2>
        <div class="car-listing-grid">
            <!-- Static example of cars -->
            <div class="car-card">
                <img src="images/car1.jpg" alt="Car Image">
                <div class="car-info">
                    <h3>Mercedes-Benz A-Class</h3>
                    <p>Preço: €25,000</p>
                    <p>Ano: 2020</p>
                </div>
            </div>

            <div class="car-card">
                <img src="images/car2.jpg" alt="Car Image">
                <div class="car-info">
                    <h3>BMW 3 Series</h3>
                    <p>Preço: €30,000</p>
                    <p>Ano: 2021</p>
                </div>
            </div>

            <!-- More car listings here -->
        </div>

        <!-- Pagination -->
        <div class="pagination">
            <a href="#">&#171; Previous</a>
            <a href="#">1</a>
            <a href="#">2</a>
            <a href="#">Next &#187;</a>
        </div>
    </div>
</main>

<footer>
    <div class="container">
        <div class="social-links">
            <a href="https://twitter.com/yourprofile" target="_blank" class="social-icon">
                <img src="images/twitter.png" alt="Twitter">
            </a>
            <a href="mailto:youremail@example.com" class="social-icon">
                <img src="images/email-icon.png" alt="Email">
            </a>
        </div>
        <p>&copy; 2024 Garagem Virtual. Todos os direitos reservados.</p>
    </div>
</footer>

</body>
</html>
